<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />

  <!-- PWA and Mobile Optimization -->
  <meta name="theme-color" content="#1552ab" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#1552ab" media="(prefers-color-scheme: light)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Reaching Germany Retreat 26" />
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- Touch Icons -->
  <link rel="apple-touch-icon" href="/logo-light.png" />
  <link rel="icon" type="image/png" href="/logo-light.png" />

  <meta name="description" content="Official participant directory for the European Leaders Summit (ELS) Madrid 2026. Connect with ministry leaders and view the participant map." />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="ELS Madrid 2026 Participant Directory" />
  <meta property="og:description" content="Official participant directory for the European Leaders Summit (ELS) Madrid 2026. Connect with ministry leaders." />
  <meta property="og:image" content="/logo-light.png" />

  <title>ELS Madrid 2026 Participant Directory</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              'els-blue': '#1552ab',
              'els-gray': '#efefef',
            }
          },
          fontFamily: {
            avenir: ['"Avenir Next"', 'Avenir', 'system-ui', 'sans-serif'],
            didot: ['"Bodoni Moda"', 'serif'],
          },
          borderRadius: {
            'card': '12px',
            'modal': '20px',
            'button': '10px',
            'xl-card': '16px',
          },
          boxShadow: {
            'card': '0 4px 20px rgba(0,0,0,0.08)',
            'modal': '0 20px 50px rgba(0,0,0,0.3)',
            'glow': '0 0 15px rgba(27, 82, 169, 0.3)',
          },
          animation: {
            'fade-in': 'fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'slide-up': 'slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'reveal': 'reveal 1s cubic-bezier(0.16, 1, 0.3, 1) forwards',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: 0 },
              '100%': { opacity: 1 },
            },
            slideUp: {
              '0%': { opacity: 0, transform: 'translateY(20px)' },
              '100%': { opacity: 1, transform: 'translateY(0)' },
            },
            reveal: {
              '0%': { clipPath: 'inset(0 100% 0 0)' },
              '100%': { clipPath: 'inset(0 0 0 0)' },
            }
          }
        },
      },
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400..900;1,400..900&display=swap"
    rel="stylesheet">
  <style>
    /* Font Weight Definitions for Avenir */
    @font-face {
      font-family: 'Avenir Next';
      src: local('Avenir Next Bold');
      font-weight: 700;
    }

    @font-face {
      font-family: 'Avenir Next';
      src: local('Avenir Next Medium');
      font-weight: 500;
    }

    @font-face {
      font-family: 'Avenir Next';
      src: local('Avenir Next Regular');
      font-weight: 400;
    }

    @font-face {
      font-family: 'Avenir Next';
      src: local('Avenir Next Ultra Light');
      font-weight: 350;
    }
    :root {
      --brand-heaven-gold: #1552ab;
      --brand-gold: #efefef;
      --brand-els-blue: #1552ab;
      --brand-els-gray: #efefef;

      /* Design Token Scale */
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --radius-pill: 9999px;

      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-6: 24px;
      --space-8: 32px;
      --space-10: 40px;
      --space-12: 48px;

      --shadow-card: 0 4px 30px rgba(21, 82, 171, 0.05), 0 1px 3px rgba(0, 0, 0, 0.02);
      --shadow-card-hover: 0 10px 40px rgba(21, 82, 171, 0.12), 0 1px 8px rgba(0, 0, 0, 0.04);
      --shadow-modal: 0 24px 64px rgba(0, 0, 0, 0.15), 0 8px 24px rgba(0, 0, 0, 0.08);
      --shadow-glow: 0 0 25px rgba(21, 82, 171, 0.2);

      /* Glassmorphism Styles */
      --glass-bg-light: rgba(255, 255, 255, 0.7);
      --glass-bg-dark: rgba(18, 24, 41, 0.7);
      --glass-border-light: rgba(21, 82, 171, 0.08);
      --glass-border-dark: rgba(255, 255, 255, 0.08);
    }

    body {
      font-family: "Avenir Next", Avenir, sans-serif;
      background-color: #efefef;
      color: #1552ab;
      -webkit-font-smoothing: antialiased;
      transition: background-color 0.4s ease, color 0.4s ease;
    }

    html.dark body {
      background-color: #0a0f1d;
      color: #f8fafc;
    }

    /* Prevent "bounce" effect and scroll bleeding on mobile */
    html,
    body {
      overscroll-behavior-y: contain;
    }

    .font-avenir-bold {
      font-weight: 700;
    }

    .font-avenir-medium {
      font-weight: 500;
    }

    .font-avenir-roman {
      font-weight: 400;
    }

    .font-avenir-book {
      font-weight: 350;
    }

    ::-webkit-scrollbar {
      width: 5px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(21,82,171,0.4);
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #1552ab;
    }

    /* Firefox scrollbar */
    * {
      scrollbar-width: thin;
      scrollbar-color: rgba(21,82,171,0.4) transparent;
    }

    /* Skeleton shimmer animation */
    @keyframes shimmer {
      0% { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }

    .skeleton {
      background: linear-gradient(
        90deg,
        rgba(21,82,171,0.06) 25%,
        rgba(21,82,171,0.12) 50%,
        rgba(21,82,171,0.06) 75%
      );
      background-size: 800px 100%;
      animation: shimmer 1.5s infinite linear;
      border-radius: 8px;
    }

    html.dark .skeleton {
      background: linear-gradient(
        90deg,
        rgba(255,255,255,0.04) 25%,
        rgba(255,255,255,0.08) 50%,
        rgba(255,255,255,0.04) 75%
      );
      background-size: 800px 100%;
      animation: shimmer 1.5s infinite linear;
    }

    @keyframes fade-in {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-fade-in {
      animation: fade-in 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    /* Staggered card entrance */
    @keyframes card-enter {
      from {
        opacity: 0;
        transform: translateY(16px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .card-stagger {
      animation: card-enter 0.45s cubic-bezier(0.16, 1, 0.3, 1) both;
      animation-delay: calc(var(--card-index, 0) * 35ms);
    }

    /* Respect reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .animate-fade-in,
      .card-stagger,
      .skeleton {
        animation: none !important;
        opacity: 1 !important;
        transform: none !important;
      }
    }

    /* Mobile Optimizations */
    @media (max-width: 768px) {
      body {
        -webkit-tap-highlight-color: rgba(21, 82, 171, 0.2);
        -webkit-touch-callout: none;
      }

      /* Prevent zoom on input focus (iOS) */
      input,
      select,
      textarea {
        font-size: 16px !important;
      }

      /* Better scrolling on iOS */
      * {
        -webkit-overflow-scrolling: touch;
      }
    }

    /* Tablet Landscape Optimizations */
    @media (min-width: 768px) and (max-width: 1024px) and (orientation: landscape) {
      .custom-scrollbar {
        max-height: 60vh;
      }
    }

    /* Custom scrollbar for mobile */
    .custom-scrollbar {
      scrollbar-width: thin;
      scrollbar-color: var(--brand-heaven-gold) transparent;
    }
  </style>

</head>

<body class="font-avenir">
  <!-- placeholder aria-label -->
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
